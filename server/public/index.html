<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cust Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100 min-h-screen">

  <div x-data="app" x-cloak>

    <!-- Loading -->
    <template x-if="authLoading">
      <div class="min-h-screen flex items-center justify-center">
        <div class="flex items-center gap-3 text-slate-400 animate-pulse">
          <div class="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
          <span class="text-sm font-medium">Loading...</span>
        </div>
      </div>
    </template>

    <!-- Login Page -->
    <template x-if="!authLoading && page === 'login'">
      <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 shadow-2xl">
          <div class="text-center mb-8">
            <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-indigo-500/20 flex items-center justify-center">
              <i data-lucide="shield-check" class="w-7 h-7 text-indigo-400"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white/90">Dashboard Login</h1>
            <p class="text-sm text-slate-400 mt-1">My Cust V2 Admin Panel</p>
          </div>
          <form @submit.prevent="login" class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5">Username</label>
              <input x-model="loginForm.username" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 transition" placeholder="admin" required>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
              <input x-model="loginForm.password" type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 transition" placeholder="admin123" required>
            </div>
            <p x-show="loginForm.error" x-text="loginForm.error" class="text-xs text-rose-400 text-center"></p>
            <button type="submit" class="w-full bg-indigo-500/80 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl py-2.5 transition backdrop-blur-sm">
              Sign In
            </button>
          </form>
        </div>
      </div>
    </template>

    <!-- Dashboard -->
    <template x-if="!authLoading && page === 'dashboard'">
      <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-gradient-to-b from-slate-900/95 to-slate-900/80 backdrop-blur-xl border-r border-white/5 flex flex-col">
          <div class="p-5 border-b border-white/5">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-xl bg-indigo-500/20 flex items-center justify-center">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-indigo-400"></i>
              </div>
              <div>
                <h1 class="text-sm font-bold tracking-tight text-white/90">My Cust</h1>
                <p class="text-[10px] text-slate-500">Admin Panel</p>
              </div>
            </div>
          </div>

          <div class="p-3 space-y-1 overflow-y-auto custom-scrollbar flex-1">
            <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Categories</p>
            <template x-for="cat in categories" :key="cat.id">
              <button @click="currentTab = cat.id; loadItems()" :class="currentTab === cat.id ? 'bg-white/10 text-white' : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition">
                <i :data-lucide="cat.icon" class="w-4 h-4"></i>
                <span x-text="cat.label" class="truncate"></span>
              </button>
            </template>
            <button @click="addCategory()" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-500 hover:text-slate-300 transition mt-1">
              <i data-lucide="plus" class="w-4 h-4"></i>
              <span>Add Category</span>
            </button>

            <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mt-4 mb-1">System</p>
            <button @click="openAdminModal()" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-slate-200 hover:bg-white/5 transition">
              <i data-lucide="users" class="w-4 h-4"></i>
              <span>Admins</span>
            </button>
            <button @click="openLogModal()" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-slate-200 hover:bg-white/5 transition">
              <i data-lucide="scroll-text" class="w-4 h-4"></i>
              <span>Activity Logs</span>
            </button>
            <button @click="page = 'data'" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-slate-200 hover:bg-white/5 transition">
              <i data-lucide="database" class="w-4 h-4"></i>
              <span>Data Management</span>
            </button>
          </div>

          <div class="mt-auto p-4 border-t border-white/5">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center">
                <i data-lucide="user" class="w-4 h-4 text-emerald-400"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p x-text="admin?.username || 'Admin'" class="text-sm font-medium text-white/90 truncate"></p>
                <p x-text="admin?.role || ''" class="text-[10px] text-slate-500 capitalize"></p>
              </div>
              <button @click="logout()" class="p-1.5 rounded-lg hover:bg-white/5 text-slate-500 hover:text-rose-400 transition">
                <i data-lucide="log-out" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 min-h-screen flex flex-col">
          <!-- Top Bar -->
          <div class="h-16 border-b border-white/5 bg-white/5 backdrop-blur-lg flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
              <h2 x-text="categories.find(c => c.id === currentTab)?.label || 'Dashboard'" class="text-lg font-semibold text-white/90"></h2>
              <span x-show="loading" class="w-4 h-4 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></span>
            </div>
            <div class="flex items-center gap-3">
              <div class="relative">
                <i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2"></i>
                <input x-model="search" type="text" placeholder="Search items..." class="bg-white/5 border border-white/10 rounded-xl pl-9 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 w-56 transition">
              </div>
              <button @click="openItemModal()" class="bg-indigo-500/80 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl px-4 py-2 flex items-center gap-2 transition backdrop-blur-sm">
                <i data-lucide="plus" class="w-4 h-4"></i>
                Add Item
              </button>
            </div>
          </div>

          <!-- Items Grid -->
          <div class="flex-1 p-6 overflow-y-auto custom-scrollbar">
            <template x-if="filteredItems.length === 0">
              <div class="flex flex-col items-center justify-center h-64 text-center">
                <div class="w-16 h-16 rounded-2xl bg-white/5 flex items-center justify-center mb-4">
                  <i data-lucide="inbox" class="w-8 h-8 text-slate-500"></i>
                </div>
                <h3 class="text-lg font-semibold text-white/80">No items yet</h3>
                <p class="text-sm text-slate-500 mt-1">Click "Add Item" to create your first entry.</p>
              </div>
            </template>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
              <template x-for="item in filteredItems" :key="item.id">
                <div class="group bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5 hover:bg-white/10 hover:border-white/20 transition-all duration-300 cursor-pointer" @click="openItemModal(item)">
                  <div class="flex items-start justify-between mb-3">
                    <h3 x-text="item.title" class="text-base font-semibold text-white/90 line-clamp-1"></h3>
                    <span :class="getStatusColor(item.status)" class="text-[10px] px-2 py-0.5 rounded-full font-medium uppercase tracking-wide" x-text="item.status"></span>
                  </div>
                  <p x-text="item.content" class="text-sm text-slate-400 line-clamp-2 mb-4"></p>
                  <div class="flex items-center justify-between text-xs text-slate-500">
                    <span :class="getPriorityColor(item.priority)" class="font-medium" x-text="item.priority"></span>
                    <span x-text="new Date(item.date).toLocaleDateString()"></span>
                  </div>
                  <div class="flex flex-wrap gap-1.5 mt-3" x-show="item.tags && item.tags.length">
                    <template x-for="tag in item.tags" :key="tag">
                      <span class="text-[10px] px-2 py-0.5 rounded-md bg-white/5 text-slate-400 border border-white/5" x-text="tag"></span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </main>
      </div>
    </template>

    <!-- Data Management Page -->
    <template x-if="!authLoading && page === 'data'">
      <div class="min-h-screen p-6 max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold text-white/90">Data Management</h2>
          <button @click="page = 'dashboard'" class="text-sm text-slate-400 hover:text-white transition flex items-center gap-1">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
          </button>
        </div>
        <div class="space-y-6">
          <!-- Export & Import -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6">
              <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center">
                  <i data-lucide="download" class="w-5 h-5 text-emerald-400"></i>
                </div>
                <div>
                  <h3 class="font-semibold text-white/90">Export Data</h3>
                  <p class="text-xs text-slate-400">Download full JSON backup</p>
                </div>
              </div>
            <button @click="handleExport()" class="inline-flex items-center gap-2 bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-300 border border-emerald-500/30 px-4 py-2 rounded-xl text-sm font-medium transition-all">
              <i data-lucide="download" class="w-4 h-4"></i>
              Download Backup
            </button>

            </div>
            <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6">
              <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-amber-500/20 flex items-center justify-center">
                  <i data-lucide="upload" class="w-5 h-5 text-amber-400"></i>
                </div>
                <div>
                  <h3 class="font-semibold text-white/90">Import Data</h3>
                  <p class="text-xs text-slate-400">Restore from JSON backup</p>
                </div>
              </div>
              <input type="file" accept=".json" @change="handleImport($event)" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-amber-500/20 file:text-amber-300 hover:file:bg-amber-500/30 transition-all">
            </div>
          </div>

          <!-- Categories Config -->
          <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6">
            <div class="flex items-center justify-between mb-4">
              <div>
                <h3 class="font-semibold text-white/90">Categories</h3>
                <p class="text-xs text-slate-400 mt-1">Add or remove sections</p>
              </div>
              <button @click="addCategory()" class="flex items-center gap-2 bg-indigo-500/20 hover:bg-indigo-500/30 text-indigo-300 border border-indigo-500/30 px-3 py-1.5 rounded-lg text-sm transition-all">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                Add
              </button>
            </div>
            <div class="space-y-2">
              <template x-for="(cat, index) in categories" :key="cat.id">
                <div class="flex items-center gap-3 bg-white/5 rounded-xl p-3 border border-white/5">
                  <input x-model="cat.label" class="flex-1 bg-transparent text-sm text-slate-200 focus:outline-none" placeholder="Label">
                  <input x-model="cat.icon" class="w-24 bg-transparent text-sm text-slate-400 focus:outline-none" placeholder="Icon">
                  <input x-model="cat.color" class="w-24 bg-transparent text-sm text-slate-400 focus:outline-none" placeholder="Color">
                  <button @click="removeCategory(index)" class="text-rose-400 hover:text-rose-300 p-1.5 rounded-lg hover:bg-rose-500/10 transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </template>
            </div>
            <button @click="saveConfig()" class="mt-4 bg-indigo-500/80 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all">
              Save Configuration
            </button>
          </div>
        </div>
      </div>
    </template>

    <!-- Item Modal -->
    <div x-show="modalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeModal()"></div>
      <div class="relative w-full max-w-md bg-slate-900/95 backdrop-blur-2xl border border-white/10 rounded-3xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-5">
          <h3 x-text="editingItem ? 'Edit Item' : 'Add Item'" class="text-lg font-bold text-white/90"></h3>
          <button @click="closeModal()" class="p-1.5 rounded-lg hover:bg-white/5 text-slate-500 hover:text-white transition">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Title</label>
            <input x-model="formData.title" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500/50 transition" required>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Content</label>
            <textarea x-model="formData.content" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500/50 transition resize-none"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5">Status</label>
              <select x-model="formData.status" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500/50 transition appearance-none">
                <option value="active">Active</option>
                <option value="completed">Completed</option>
                <option value="archived">Archived</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5">Priority</label>
              <select x-model="formData.priority" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500/50 transition appearance-none">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Tags (comma separated)</label>
            <input x-model="formData.tags" type="text" placeholder="urgent, frontend, review" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition">
          </div>
          <div class="flex gap-3 pt-2">
            <button @click="saveItem()" class="flex-1 bg-indigo-500/80 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl py-2.5 transition backdrop-blur-sm">Save</button>
            <button @click="closeModal()" class="px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white transition">Cancel</button>
          </div>
          <template x-if="editingItem">
            <button @click="deleteItem(editingItem.id); closeModal()" class="w-full text-rose-400 text-xs hover:text-rose-300 transition text-center mt-1">Delete this item</button>
          </template>
        </div>
      </div>
    </div>

    <!-- Admin Modal -->
    <div x-show="showAdminModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeAdminModal()"></div>
      <div class="relative w-full max-w-lg bg-slate-900/95 backdrop-blur-2xl border border-white/10 rounded-3xl p-6 shadow-2xl max-h-[85vh] overflow-y-auto custom-scrollbar">
        <div class="flex items-center justify-between mb-5">
          <h3 class="text-lg font-bold text-white/90">Admin Management</h3>
          <button @click="closeAdminModal()" class="p-1.5 rounded-lg hover:bg-white/5 text-slate-500 hover:text-white transition">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        
        <template x-if="admin?.role === 'superadmin'">
          <div class="bg-white/5 border border-white/10 rounded-2xl p-4 mb-5">
            <h4 class="text-sm font-semibold text-white/80 mb-3">Create New Admin</h4>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <input x-model="newAdmin.username" type="text" placeholder="Username" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition">
              <input x-model="newAdmin.password" type="password" placeholder="Password" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition">
            </div>
            <select x-model="newAdmin.role" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white mb-3 appearance-none">
              <option value="admin">Admin</option>
              <option value="superadmin">Superadmin</option>
            </select>
            <p x-show="newAdmin.error" x-text="newAdmin.error" class="text-xs text-rose-400 mb-2"></p>
            <button @click="createAdmin()" class="bg-indigo-500/80 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl px-4 py-2 transition backdrop-blur-sm">Create Admin</button>
          </div>
        </template>

        <h4 class="text-sm font-semibold text-white/80 mb-3">Existing Admins</h4>
        <div class="space-y-2">
          <template x-for="a in admins" :key="a.id">
            <div class="flex items-center justify-between bg-white/5 border border-white/10 rounded-xl px-4 py-3">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-500/20 flex items-center justify-center">
                  <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                </div>
                <div>
                  <p x-text="a.username" class="text-sm font-medium text-white/90"></p>
                  <p class="text-[10px] text-slate-500 capitalize" x-text="a.role"></p>
                </div>
              </div>
              <template x-if="admin?.role === 'superadmin' && a.id !== admin?.id">
                <button @click="deleteAdmin(a.id)" class="p-1.5 rounded-lg hover:bg-rose-500/10 text-slate-500 hover:text-rose-400 transition">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Activity Log Modal -->
    <div x-show="showLogModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeLogModal()"></div>
      <div class="relative w-full max-w-3xl bg-slate-900/95 backdrop-blur-2xl border border-white/10 rounded-3xl p-6 shadow-2xl max-h-[85vh] flex flex-col">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-white/90">Activity Logs</h3>
          <button @click="closeLogModal()" class="p-1.5 rounded-lg hover:bg-white/5 text-slate-500 hover:text-white transition">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="relative mb-4">
          <i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input x-model="logFilter" type="text" placeholder="Filter by action, admin, or target..." class="w-full bg-white/5 border border-white/10 rounded-xl pl-9 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 transition">
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar">
          <table class="w-full text-left">
            <thead class="sticky top-0 bg-slate-900/95 backdrop-blur">
              <tr class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider border-b border-white/5">
                <th class="py-2 pr-4">Time</th>
                <th class="py-2 pr-4">Admin</th>
                <th class="py-2 pr-4">Action</th>
                <th class="py-2">Target</th>
              </tr>
            </thead>
            <tbody class="text-xs">
              <template x-for="log in filteredLogs" :key="log.id">
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                  <td class="py-2.5 pr-4 text-slate-400 whitespace-nowrap" x-text="formatDate(log.timestamp)"></td>
                  <td class="py-2.5 pr-4 text-white/80">
                    <span class="inline-flex items-center gap-1">
                      <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                      <span x-text="log.adminName"></span>
                    </span>
                  </td>
                  <td class="py-2.5 pr-4">
                    <span :class="{
                      'bg-emerald-500/15 text-emerald-300': log.action.includes('CREATE'),
                      'bg-amber-500/15 text-amber-300': log.action.includes('UPDATE'),
                      'bg-rose-500/15 text-rose-300': log.action.includes('DELETE'),
                      'bg-blue-500/15 text-blue-300': log.action === 'LOGIN',
                      'bg-slate-500/15 text-slate-300': log.action === 'EXPORT_DATA' || log.action === 'IMPORT_DATA'
                    }" class="px-2 py-0.5 rounded-md text-[10px] font-medium uppercase tracking-wide" x-text="log.action.replace('_', ' ')"></span>
                  </td>
                  <td class="py-2.5 text-slate-400 truncate max-w-[200px]" x-text="log.target"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <p x-show="filteredLogs.length === 0" class="text-center text-sm text-slate-500 py-8">No logs found</p>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-transition class="fixed bottom-6 right-6 z-50 bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-xl px-4 py-3 shadow-2xl flex items-center gap-3">
      <span :class="toast.type === 'success' ? 'text-emerald-400' : 'text-rose-400'">
        <i :data-lucide="toast.type === 'success' ? 'check-circle' : 'alert-circle'" class="w-5 h-5"></i>
      </span>
      <p class="text-sm text-slate-200" x-text="toast.message"></p>
    </div>

  </div>

  <script src="dashboard.js"></script>
  <script>
    document.addEventListener('alpine:init', () => {
      setTimeout(() => lucide.createIcons(), 100);
    });
  </script>
</body>
</html>
